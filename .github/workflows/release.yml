name: Release Windows

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release-win:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Verify app version matches tag
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}"
          $pkgVersion = node -p "require('./package.json').version"
          if ($tag -ne "v$pkgVersion") {
            Write-Error "Tag $tag does not match package.json version v$pkgVersion."
            exit 1
          }

      - name: Build and publish Windows release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm run release:win
